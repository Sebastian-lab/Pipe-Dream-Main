services:
  backend:
    build: ./backend
    image: pipe-dream-backend:v1.0
    container_name: backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
    networks:
      - app-network
    ports:
      - "8000:8000"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
      args:
        VITE_API_KEY: ${VITE_API_KEY}
    image: pipe-dream-nginx:v1.0
    container_name: nginx
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "8080:80"

  cloudflared:
    image: cloudflare/cloudflared
    container_name: cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run --token-file /etc/cloudflared/token
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    env_file:
      - .env
    depends_on:
      - nginx
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
